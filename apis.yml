apis:
  - aid: openmenu:rest-api
    name: OpenMenu API
    description: >-
      The OpenMenu REST API returns structured restaurant and menu data built on
      the OpenMenu Format. Standard endpoints include search, restaurant,
      location, deals, and ingredients, returning menu items with prices,
      locations, and dietary attributes. An Enhanced enterprise tier adds
      DishDNA ML-driven analysis, trends, heatmaps, and gap analysis.
      Authentication uses an API key, with a sandbox mode for sample data.
