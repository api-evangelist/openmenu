aid: openmenu
name: OpenMenu
description: >-
  OpenMenu provides structured menu data and menu publishing for restaurants,
  built on the open OpenMenu Format specification. Its public REST API helps
  developers locate restaurants, menus, and menu items, returning structured
  data including names, descriptions, prices, locations, and dietary attributes
  such as vegan, vegetarian, halal, kosher, and gluten-free. The standard API
  covers search, restaurant, location, deals, and ingredients endpoints, while
  an Enhanced enterprise tier adds DishDNA machine-learning analysis, trends,
  heatmaps, and gap analysis. The API offers a sandbox mode, API key
  authentication, tiered pricing from a free plan up to enterprise, plus Python
  and Node.js SDKs and code samples.
type: Index
