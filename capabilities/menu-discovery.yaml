apiVersion: naftiko.ai/v1
kind: CapabilityWorkflow
metadata:
  name: menu-discovery
  title: Menu Discovery
  description: >-
    Locate restaurants in a geographic area, retrieve a full restaurant profile
    with its menus and items, and surface any active deals, using structured
    OpenMenu Format data.
spec:
  uses:
    - shared/openmenu-api
  steps:
    - id: find-restaurants
      operation: openmenu-api.listLocations
      description: List restaurants in a city or postal code.
    - id: load-profile
      operation: openmenu-api.getRestaurant
      description: Retrieve the full menu profile for a chosen restaurant.
      input:
        id: "{{ steps.find-restaurants.result.restaurants[0].id }}"
    - id: load-deals
      operation: openmenu-api.getDeals
      description: Fetch coupons and specials for the restaurant.
      input:
        id: "{{ steps.find-restaurants.result.restaurants[0].id }}"
